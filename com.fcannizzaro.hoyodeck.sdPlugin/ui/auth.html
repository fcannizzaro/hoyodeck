<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Hoyo Deck Settings</title>
    <link rel="stylesheet" href="common.css" />
    <script src="common.js"></script>
  </head>
  <body>
    <div class="sdpi-wrapper">
      <div class="sdpi-heading">Authentication</div>

      <div class="sdpi-item">
        <div class="sdpi-item-label">Cookie String</div>
        <div class="sdpi-item-value">
          <textarea
            id="cookieInput"
            placeholder="Paste your HoYoLAB cookies here..."
          ></textarea>
        </div>
        <div class="sdpi-info">
          1. Go to hoyolab.com and log in<br />
          2. Open DevTools (F12) → Network tab<br />
          3. Find any request and copy the Cookie header<br />
          4. Paste the entire cookie string above
        </div>
      </div>

      <div class="sdpi-item">
        <button id="parseButton">Parse Cookies</button>
      </div>

      <div id="authStatus" class="status-message" style="display: none"></div>

      <div class="divider"></div>

      <div class="sdpi-item">
        <div class="sdpi-item-label">Game UID</div>
        <div class="sdpi-item-value">
          <input
            type="text"
            id="uidInput"
            placeholder="Enter your Genshin Impact UID"
            maxlength="10"
          />
        </div>
        <div class="sdpi-info">
          Your in-game UID (9-10 digits). Found in the game's profile screen.
        </div>
      </div>

      <div id="uidStatus" class="status-message" style="display: none"></div>

      <div class="divider"></div>

      <div class="sdpi-heading">Current Auth Status</div>
      <div id="currentStatus" class="sdpi-info">Checking...</div>
    </div>

    <script>
      // DOM elements
      const cookieInput = document.getElementById('cookieInput');
      const parseButton = document.getElementById('parseButton');
      const authStatus = document.getElementById('authStatus');
      const uidInput = document.getElementById('uidInput');
      const uidStatus = document.getElementById('uidStatus');
      const currentStatus = document.getElementById('currentStatus');

      // Called when connected to Stream Deck
      function onConnected() {
        // Request global settings
        requestGlobalSettings();
      }

      // Called when global settings are received
      function onGlobalSettingsReceived(settings) {
        // Update UID input
        if (settings.uid) {
          uidInput.value = settings.uid;
        }

        // Update current status
        updateCurrentStatus(settings);
      }

      // Update current auth status display
      function updateCurrentStatus(settings) {
        if (settings.auth && isValidAuth(settings.auth)) {
          currentStatus.textContent =
            '✓ Authenticated (ltuid: ' + settings.auth.ltuid_v2 + ')';
          currentStatus.style.color = '#4caf50';
        } else {
          currentStatus.textContent = '✗ Not authenticated';
          currentStatus.style.color = '#f44336';
        }
      }

      // Parse cookies button click
      parseButton.addEventListener('click', function () {
        const cookieString = cookieInput.value.trim();

        if (!cookieString) {
          showStatus(authStatus, 'Please paste your cookies first', 'error');
          return;
        }

        const auth = extractAuthFromCookies(cookieString);

        if (!isValidAuth(auth)) {
          showStatus(
            authStatus,
            'Missing required tokens. Make sure you copied the full cookie string.',
            'error'
          );
          return;
        }

        // Save auth to global settings
        saveGlobalSettings({ auth: auth });

        showStatus(authStatus, 'Authentication saved successfully!', 'success');
        cookieInput.value = '';

        // Update status
        updateCurrentStatus({ auth: auth });
      });

      // UID input change
      uidInput.addEventListener('change', function () {
        const uid = uidInput.value.trim();

        if (!uid) {
          return;
        }

        // Validate UID format
        if (!/^\d{9,10}$/.test(uid)) {
          showStatus(uidStatus, 'UID should be 9-10 digits', 'error');
          return;
        }

        // Save UID to global settings
        saveGlobalSettings({ uid: uid });
        showStatus(uidStatus, 'UID saved!', 'success');
      });

      // Show status message
      function showStatus(element, message, type) {
        element.textContent = message;
        element.className =
          'status-message status-' + (type === 'error' ? 'error' : 'success');
        element.style.display = 'block';

        // Hide after 3 seconds
        setTimeout(function () {
          element.style.display = 'none';
        }, 3000);
      }
    </script>
  </body>
</html>
