<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Transformer Settings</title>
    <link rel="stylesheet" href="../common.css" />
    <script src="../common.js"></script>
  </head>
  <body>
    <div class="sdpi-wrapper">
      <div class="sdpi-heading">Transformer Settings</div>

      <div class="sdpi-item">
        <div class="sdpi-item-label">Display Style</div>
        <div class="sdpi-item-value">
          <select id="displayStyle">
            <option value="text">Text (Countdown)</option>
            <option value="icon">Icon Only</option>
          </select>
        </div>
        <div class="sdpi-info">
          Choose how to display the transformer status.
        </div>
      </div>

      <div class="divider"></div>

      <div class="sdpi-heading">Authentication</div>
      <div class="sdpi-info">
        Configure your HoYoLAB authentication in the global plugin settings.
        Click any other action to access the auth setup.
      </div>
    </div>

    <script>
      const displayStyle = document.getElementById('displayStyle');

      function onConnected() {
        // Load current settings
        if (settings.style) {
          displayStyle.value = settings.style;
        }
      }

      function onSettingsReceived(newSettings) {
        if (newSettings.style) {
          displayStyle.value = newSettings.style;
        }
      }

      displayStyle.addEventListener('change', function () {
        saveSettings({ style: displayStyle.value });
      });
    </script>
  </body>
</html>
