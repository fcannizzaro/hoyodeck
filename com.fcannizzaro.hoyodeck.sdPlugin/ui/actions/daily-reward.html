<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Daily Reward Settings</title>
    <link rel="stylesheet" href="../common.css" />
    <script src="../common.js"></script>
  </head>
  <body>
    <div class="sdpi-wrapper">
      <div class="sdpi-heading">Daily Reward Settings</div>

      <div class="sdpi-item">
        <label class="sdpi-checkbox">
          <input type="checkbox" id="claimOnClick" checked />
          <span>Claim reward on click</span>
        </label>
        <div class="sdpi-info">
          When enabled, pressing the button will automatically claim the daily
          check-in reward.
        </div>
      </div>

      <div class="divider"></div>

      <div class="sdpi-heading">Authentication</div>
      <div class="sdpi-info">
        Configure your HoYoLAB authentication in the global plugin settings.
        Click any other action to access the auth setup.
      </div>
    </div>

    <script>
      const claimOnClick = document.getElementById('claimOnClick');

      function onConnected() {
        // Load current settings
        if (settings.claimOnClick !== undefined) {
          claimOnClick.checked = settings.claimOnClick;
        }
      }

      function onSettingsReceived(newSettings) {
        if (newSettings.claimOnClick !== undefined) {
          claimOnClick.checked = newSettings.claimOnClick;
        }
      }

      claimOnClick.addEventListener('change', function () {
        saveSettings({ claimOnClick: claimOnClick.checked });
      });
    </script>
  </body>
</html>
