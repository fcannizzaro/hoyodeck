<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Banner Settings</title>
    <link rel="stylesheet" href="../common.css" />
    <script src="../common.js"></script>
  </head>
  <body>
    <div class="sdpi-wrapper">
      <div class="sdpi-heading">Banner Settings</div>

      <div class="sdpi-item">
        <div class="sdpi-item-label">Banner Type</div>
        <div class="sdpi-item-value">
          <select id="bannerType">
            <option value="character">Character Event Wish</option>
            <option value="weapon">Weapon Event Wish</option>
          </select>
        </div>
        <div class="sdpi-info">
          Select which type of wish banner to display.
        </div>
      </div>

      <div class="divider"></div>

      <div class="sdpi-heading">Authentication</div>
      <div class="sdpi-info">
        Configure your HoYoLAB authentication in the global plugin settings.
        Click any other action to access the auth setup.
      </div>
    </div>

    <script>
      const bannerType = document.getElementById('bannerType');

      function onConnected() {
        // Load current settings
        if (settings.type) {
          bannerType.value = settings.type;
        }
      }

      function onSettingsReceived(newSettings) {
        if (newSettings.type) {
          bannerType.value = newSettings.type;
        }
      }

      bannerType.addEventListener('change', function () {
        saveSettings({ type: bannerType.value });
      });
    </script>
  </body>
</html>
